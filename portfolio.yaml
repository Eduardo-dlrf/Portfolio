  - title: "Autonomous Mobile Robotics - John Deere Advanced Control"
    description: "Designed and engineered an autonomous 4WD skid-steer vehicle prototype in collaboration with John Deere. Formulated formal Dynamic Plant Identification in MATLAB utilizing structural Step Response and Autoregressive with Exogenous Input (ARX) modeling matrices to map mechanical friction and motor profiles with over 70% accuracy. Implemented a deterministic multi-loop control architecture on an STM32 MCU, integrating 4 independent speed PI loops via 12-bit PWM resolution (0.8mV increments) and 4 EXTI encoder lines, cascaded under a master orientation PI tracking loop using digital high-pass filtered MPU6050 gyroscope telemetry."
    published: "2023-11-28T09:00:00Z"
    file: "https://github.com/Eduardo-dlrf/Autonomous-4WD-Control-System"
    type: "text/html"
    preview_img: "/images/white.jpg"
    category: "projects"

  - title: "Dual-Core Smart Tire Inflation Platform - John Deere Advanced Embedded Systems"
    description: "Engineered a dual-core asymmetric multiprocessing (AMP) tire-inflation system on an STM32H7 MCU (ARM Cortex-M7 @480MHz & Cortex-M4 @240MHz) in collaboration with John Deere. Programmed a deterministic hardware boot-handshake protocol using Hardware Semaphores (HSEM) to synchronize multi-domain core executions. Implemented high-resolution 16-bit ADC sensor sampling and multi-loop discrete PID tracking on the CM7 core, linked via a 500 Kbps FDCAN industrial multiplexed network to receive remote target setpoints, complemented by an independent FreeRTOS and FATFS supervisor subsystem running on the CM4 core."
    published: "2022-12-01T09:00:00Z"
    file: "https://github.com/Eduardo-dlrf/DualCore-Pressure-Control-System"
    type: "text/html"
    preview_img: "/images/pressure_system.jpeg"
    category: "projects"

  - title: "RTOS-Based Automotive Infotainment System"
    description: "Developed during sophomore year (4th semester) of Mechatronics Engineering. Formulated an advanced, distributed client-server architecture combining FreeRTOS kernel routines with high-level Python script loops on a Raspberry Pi multimedia engine. Engineered a deterministic, 4-task real-time firmware execution flow on an STM32F103 micro-controller, utilizing thread-safe message queues to eliminate UI blocking states during I/O processing. Features a comprehensive 4-year engineering retrospective evaluating sophomore-year architectural trade-offs against production-grade automotive standards (CAN/LIN networks, EXTI hardware interrupts, and CRC packet framing)."
    published: "2022-06-14T09:00:00Z"
    file: "https://github.com/Eduardo-dlrf/Automotive-Infotainment-System"
    type: "text/html"
    preview_img: "/images/infotainment_case.jpeg"
    category: "projects"

  - title: "Corporate IoT Health Dashboard & Google Fit API"
    description: "Engineered a full-stack corporate health tracking and gamification dashboard utilizing Flask, SQLAlchemy, and PostgreSQL deployed on the Railway cloud infrastructure. Architected a dynamic data pipeline integrating Google Fit REST API endpoints via OAuth 2.0 authorization, processing customized tracking frames into nanosecond-level aggregations to extract hourly step metrics. Authored a responsive, German-localized user dashboard via Jinja2 templates featuring mathematical real-time progress calculations against enterprise benchmarks, supplemented by a comprehensive architectural security audit."
    published: "2024-06-18T09:00:00Z"
    file: "https://github.com/Eduardo-dlrf/Corporate-Health-Dashboard"
    type: "text/html"
    preview_img: "/images/leaderboard_preview.png"
    category: "projects"

