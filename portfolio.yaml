  - title: "HIL Test Bench for Power Management - International Motors Mexico"
    description: "Engineered a 4-channel isolated power board (12V/5A) using solid-state switching for automated ECU validation. Developed ESP32 firmware parsing standard VISA commands for real-time I2C telemetry and designed a multi-threaded Python/Tkinter GUI."
    published: "2025-02-15T18:00:00Z"
    file: "https://github.com/Eduardo-dlrf/International-Power-and-Grid-Management"
    type: "text/html"
    preview_img: "/images/hil_test_bench.png"

  - title: "Autonomous Mobile Robotics - John Deere Advanced Control"
    description: "Designed modular navigation firmware with decoupled architectures for wheel control to enhance scalability. Identified systems with ARX modeling to tune closed-loop speed and steering controllers, and fused I2C/UART sensor data via filtering to mitigate dead-reckoning drift."
    published: "2024-11-30T14:00:00Z"
    file: "/documents/autonomous_robotics_report.pdf"
    type: "application/pdf"
    preview_img: "/images/autonomous_robot.png"

  - title: "Smart Tire Inflation Platform - John Deere Advanced Embedded Systems"
    description: "Engineered an automated pressure system using an STM32H7 microcontroller over a local CAN network. Implemented a closed-loop PI controller to regulate a 12V compressor and deployed a NodeMCU Wi-Fi gateway to stream sensor telemetry to Arduino IoT Cloud."
    published: "2024-06-15T10:00:00Z"
    file: "/documents/smart_tire_inflation.pdf"
    type: "application/pdf"
    preview_img: "/images/tire_inflation_platform.png"

  - title: "Embedded Audio System - Intel RTOS & Multithreading"
    description: "Engineered a multithreaded FreeRTOS architecture for concurrent UI management and real-time audio task scheduling. Optimized IPC via queues and semaphores for race-free, zero-jitter DMA audio playback, and developed a custom serial synchronization protocol."
    published: "2024-05-20T16:30:00Z"
    file: "/documents/embedded_audio_rtos.pdf"
    type: "application/pdf"
    preview_img: "/images/embedded_audio_system.png"

