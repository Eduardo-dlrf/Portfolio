<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo - Engineering Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="max-w-6xl mx-auto px-4 pt-12 pb-6 border-b border-gray-800 flex flex-col md:flex-row items-center gap-6 justify-between">
        <div class="flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
            <img id="portfolio-logo" src="" alt="Profile" class="w-24 h-24 rounded-full border-2 border-blue-500 object-cover shadow-lg hidden">
            <div>
                <h1 id="portfolio-title" class="text-3xl font-extrabold text-white tracking-tight">Loading Portfolio...</h1>
                <p id="portfolio-subtitle" class="text-lg text-gray-400 mt-1 font-light"></p>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-3 mt-4 md:mt-0 justify-center">
            <a id="lnk-linkedin" href="#" target="_blank" class="px-4 py-2 bg-blue-700 hover:bg-blue-600 rounded-lg text-xs font-bold uppercase tracking-wider transition-colors hidden">LinkedIn</a>
            <a id="lnk-github" href="#" target="_blank" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs font-bold uppercase tracking-wider transition-colors hidden">GitHub</a>
            <a id="lnk-cv" href="#" target="_blank" class="px-4 py-2 bg-green-700 hover:bg-green-600 rounded-lg text-xs font-bold uppercase tracking-wider transition-colors hidden">💾 Download CV</a>
        </div>
    </header>

    <nav class="max-w-6xl mx-auto px-4 mt-8 flex flex-wrap gap-2 justify-center md:justify-start">
        <button onclick="filterCategory('all')" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white cursor-pointer transition-all">All Fields</button>
        <button onclick="filterCategory('experience')" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-400 hover:bg-gray-700 cursor-pointer transition-all">Professional Experience</button>
        <button onclick="filterCategory('projects')" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-400 hover:bg-gray-700 cursor-pointer transition-all">Technical Projects</button>
        <button onclick="filterCategory('certifications')" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-400 hover:bg-gray-700 cursor-pointer transition-all">Certifications</button>
        <button onclick="filterCategory('languages')" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-400 hover:bg-gray-700 cursor-pointer transition-all">Languages & Immersion</button>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="tarjetas-portfolio" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <footer class="text-center py-8 text-xs text-gray-600 border-t border-gray-800 mt-12">
        <p>© 2026 Eduardo de la Rosa Flores. Dynamically syndicated via GitHub Actions.</p>
    </footer>

    <script>
        let allCardsData = []; // Runtime memory container for client-side filtering

        document.addEventListener("DOMContentLoaded", () => {
            fetch('portfolio.xml')
                .then(response => {
                    if (!response.ok) throw new Error("portfolio.xml not found");
                    return response.text();
                })
                .then(str => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(str, "text/xml");
                    const ns = "http://www.w3.org/2005/Atom";

                    const getTagText = (parent, tagName) => {
                        const el = parent.getElementsByTagNameNS(ns, tagName)[0];
                        return el ? el.textContent : '';
                    };

                    // Extract Global Parameters
                    document.getElementById('portfolio-title').textContent = getTagText(xmlDoc, 'title');
                    document.getElementById('portfolio-subtitle').textContent = getTagText(xmlDoc, 'subtitle');
                    
                    const logoUrl = getTagText(xmlDoc, 'logo');
                    if(logoUrl) {
                        const img = document.getElementById('portfolio-logo');
                        img.src = logoUrl; img.classList.remove('hidden');
                    }

                    // Map Header Links from Custom Target Nodes
                    const linkedin = getTagText(xmlDoc, 'icon');
                    const github = getTagText(xmlDoc, 'rights');
                    const cv = getTagText(xmlDoc, 'generator');
                    const prefix = getTagText(xmlDoc, 'title') ? xmlDoc.getElementsByTagNameNS(ns, 'link')[0].getAttribute('href').replace('portfolio.xml','') : '';

                    if(linkedin) { const a = document.getElementById('lnk-linkedin'); a.href = linkedin; a.classList.remove('hidden'); }
                    if(github) { const a = document.getElementById('lnk-github'); a.href = github; a.classList.remove('hidden'); }
                    if(cv) { const a = document.getElementById('lnk-cv'); a.href = cv.startsWith('/') ? prefix + cv : cv; a.classList.remove('hidden'); }

                    // Process Entries
                    const entries = xmlDoc.getElementsByTagNameNS(ns, 'entry');
                    allCardsData = Array.from(entries).map(entry => {
                        const title = getTagText(entry, 'title');
                        const summary = getTagText(entry, 'summary');
                        
                        // Parse Category
                        const catEl = entry.getElementsByTagNameNS(ns, 'category')[0];
                        const category = catEl ? catEl.getAttribute('term') : 'all';

                        const links = entry.getElementsByTagNameNS(ns, 'link');
                        let mainDocUrl = '#';
                        let previewImgUrl = '';
                        let isPdf = false;

                        Array.from(links).forEach(link => {
                            const type = link.getAttribute('type');
                            const href = link.getAttribute('href');
                            const rel = link.getAttribute('rel');

                            if (type === 'image/png' || type === 'image/jpeg') previewImgUrl = href;
                            else if (rel === 'enclosure') {
                                mainDocUrl = href;
                                if (type === 'application/pdf') isPdf = true;
                            }
                        });

                        if (!previewImgUrl) previewImgUrl = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop';

                        return { title, summary, category, mainDocUrl, previewImgUrl, isPdf };
                    });

                    renderCards('all'); // Initial deployment pass
                });
        });

        function renderCards(targetCategory) {
            const container = document.getElementById('tarjetas-portfolio');
            container.innerHTML = '';

            allCardsData.forEach(c => {
                if (targetCategory !== 'all' && c.category !== targetCategory) return;

                const html = `
                    <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 hover:border-blue-500 transition-all duration-300 shadow-xl flex flex-col">
                        <img src="${c.previewImgUrl}" alt="${c.title}" class="w-full h-48 object-cover">
                        <div class="p-6 flex flex-col flex-grow">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-blue-400 mb-1">${c.category}</span>
                            <h3 class="text-lg font-bold text-white mb-2 line-clamp-2">${c.title}</h3>
                            <p class="text-sm text-gray-400 mb-6 flex-grow line-clamp-4">${c.summary}</p>
                            <div class="mt-auto">
                                <a href="${c.mainDocUrl}" target="_blank" class="inline-flex items-center gap-2 text-xs font-semibold uppercase tracking-wider bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-lg w-full justify-center transition-colors">
                                    ${c.isPdf ? '📄 Open PDF Document' : '🚀 Launch Target Link'}
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function filterCategory(cat) {
            renderCards(cat);
            // Dynamic Active Styling Toggle
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-800', 'text-gray-400', 'hover:bg-gray-700');
            });
            const activeBtn = event.currentTarget;
            activeBtn.classList.remove('bg-gray-800', 'text-gray-400', 'hover:bg-gray-700');
            activeBtn.classList.add('bg-blue-600', 'text-white');
        }
    </script>
</body>
</html>
