<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo - Portafolio de Ingeniería y Automatización</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="max-w-6xl mx-auto px-4 pt-12 pb-6 border-b border-gray-800 text-center md:text-left md:flex md:items-center md:gap-8">
        <img id="portfolio-logo" src="" alt="Foto de Perfil" class="w-24 h-24 rounded-full mx-auto md:mx-0 border-2 border-blue-500 object-cover shadow-lg hidden">
        <div class="mt-4 md:mt-0">
            <h1 id="portfolio-title" class="text-4xl font-extrabold text-white tracking-tight">Cargando Portafolio...</h1>
            <p id="portfolio-subtitle" class="text-xl text-gray-400 mt-2 font-light"></p>
            <p id="portfolio-desc" class="text-sm text-gray-500 mt-2 max-w-2xl"></p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold text-white mb-8 flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
            Proyectos y Hitos de Ingeniería
        </h2>
        
        <div id="tarjetas-portfolio" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="text-center py-8 text-xs text-gray-600 border-t border-gray-800 mt-12">
        <p>© 2026 Eduardo de la Rosa Flores. Sindicado dinámicamente mediante GitHub Actions.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Fetch 
            fetch('portfolio.xml')
                .then(response => {
                    if (!response.ok) throw new Error("No se encontró el archivo portfolio.xml");
                    return response.text();
                })
                .then(str => {
                    // 2. Parsing of xml
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(str, "text/xml");
                    
                    // Namespace 
                    const ns = "http://www.w3.org/2005/Atom";

                    // Helper 
                    const getTagText = (parent, tagName) => {
                        const el = parent.getElementsByTagNameNS(ns, tagName)[0];
                        return el ? el.textContent : '';
                    };

                    // 3. Render global metadata- root level
                    document.getElementById('portfolio-title').textContent = getTagText(xmlDoc, 'title');
                    document.getElementById('portfolio-subtitle').textContent = getTagText(xmlDoc, 'subtitle');
                    
                    const logoUrl = getTagText(xmlDoc, 'logo');
                    if(logoUrl) {
                        const imgEl = document.getElementById('portfolio-logo');
                        imgEl.src = logoUrl;
                        imgEl.classList.remove('hidden');
                    }

                    // 4. Ciclo dinámico sobre cada etiqueta <entry> (Proyectos)
                    const entries = xmlDoc.getElementsByTagNameNS(ns, 'entry');
                    const container = document.getElementById('tarjetas-portfolio');
                    container.innerHTML = ''; // Limpiar contenedor

                    Array.from(entries).forEach(entry => {
                        const title = getTagText(entry, 'title');
                        const summary = getTagText(entry, 'summary');
                        
                        // Procesar enlaces inspeccionando el atributo "type" de la etiqueta <link>
                        const links = entry.getElementsByTagNameNS(ns, 'link');
