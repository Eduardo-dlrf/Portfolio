<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo - Engineering & Automation Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="max-w-6xl mx-auto px-4 pt-12 pb-6 border-b border-gray-800 text-center md:text-left md:flex md:items-center md:gap-8">
        <img id="portfolio-logo" src="" alt="Profile Picture" class="w-24 h-24 rounded-full mx-auto md:mx-0 border-2 border-blue-500 object-cover shadow-lg hidden">
        <div class="mt-4 md:mt-0">
            <h1 id="portfolio-title" class="text-4xl font-extrabold text-white tracking-tight">Loading Portfolio...</h1>
            <p id="portfolio-subtitle" class="text-xl text-gray-400 mt-2 font-light"></p>
            <p id="portfolio-desc" class="text-sm text-gray-500 mt-2 max-w-2xl"></p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold text-white mb-8 flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
            Engineering Milestones & Projects
        </h2>
        
        <div id="tarjetas-portfolio" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="text-center py-8 text-xs text-gray-600 border-t border-gray-800 mt-12">
        <p>© 2026 Eduardo de la Rosa Flores. Dynamically syndicated via GitHub Actions.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Asynchronously fetch the data processed by the Dockerized environment
            fetch('portfolio.xml')
                .then(response => {
                    if (!response.ok) throw new Error("Target payload 'portfolio.xml' not found on server.");
                    return response.text();
                })
                .then(str => {
                    // 2. Parse raw XML text stream into a traversal-ready DOM object tree
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(str, "text/xml");
                    
                    // Explicit W3C Atom XML Syndication Namespace definition
                    const ns = "http://www.w3.org/2005/Atom";

                    // Contextual helper to safely extract localized node content
                    const getTagText = (parent, tagName) => {
                        const el = parent.getElementsByTagNameNS(ns, tagName)[0];
                        return el ? el.textContent : '';
                    };

                    // 3. Extract and map global root-level directory metadata
                    document.getElementById('portfolio-title').textContent = getTagText(xmlDoc, 'title');
                    document.getElementById('portfolio-subtitle').textContent = getTagText(xmlDoc, 'subtitle');
                    
                    // Render custom profile element if present in the data pipeline
                    const logoUrl = getTagText(xmlDoc, 'logo');
                    if(logoUrl) {
                        const imgEl = document.getElementById('portfolio-logo');
                        imgEl.src = logoUrl;
                        imgEl.classList.remove('hidden');
                    }

                    // 4. Loop dynamically over individual <entry> records
                    const entries = xmlDoc.getElementsByTagNameNS(ns, 'entry');
                    const container = document.getElementById('tarjetas-portfolio');
                    container.innerHTML = ''; // Sanitize container bounds

                    Array.from(entries).forEach(entry => {
                        const title = getTagText(entry, 'title');
                        const summary = getTagText(entry, 'summary');
                        
                        // Parse multi-purpose enclosures by inspecting explicit MIME types
                        const links = entry.getElementsByTagNameNS(ns, 'link');
                        let mainDocUrl = '#';
                        let previewImgUrl = '';
                        let isPdf = false;

                        Array.from(links).forEach(link => {
                            const type = link.getAttribute('type');
                            const href = link.getAttribute('href');
                            const rel = link.getAttribute('rel');

                            // Isolate showcasing assets from target documentation nodes
                            if (type === 'image/png' || type === 'image/jpeg') {
                                previewImgUrl = href;
                            } else if (rel === 'enclosure') {
                                mainDocUrl = href;
                                if (type === 'application/pdf') isPdf = true;
                            }
                        });

                        // Visual fallback pattern if no layout preview graphic exists
                        if (!previewImgUrl) {
                            previewImgUrl = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop';
                        }

                        // 5. Construct and append the fluid card design into the DOM layout
                        const cardHtml = `
                            <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 hover:border-blue-500 transition-all duration-300 shadow-xl flex flex-col">
                                <img src="${previewImgUrl}" alt="${title}" class="w-full h-48 object-cover">
                                <div class="p-6 flex flex-col flex-grow">
                                    <h3 class="text-lg font-bold text-white mb-2 line-clamp-2">${title}</h3>
                                    <p class="text-sm text-gray-400 mb-6 flex-grow line-clamp-4">${summary}</p>
                                    <div class="mt-auto">
                                        <a href="${mainDocUrl}" target="_blank" class="inline-flex items-center gap-2 text-xs font-semibold uppercase tracking-wider bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-lg w-full justify-center transition-colors">
                                            ${isPdf ? '📄 Open Documentation (PDF)' : '🚀 Launch Repository / Link'}
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHtml;
                    });
                })
                .catch(err => {
                    console.error("Pipeline Failure:", err);
                    document.getElementById('portfolio-title').textContent = "Synchronization Failure";
                });
        });
    </script>
</body>
</html>
